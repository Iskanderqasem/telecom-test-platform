name: Build and Release APK

on:
  push:
    branches: [main]
    paths:
      - 'telecom-agent-apk/**'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x telecom-agent-apk/gradlew
        continue-on-error: true

      - name: Build Debug APK
        working-directory: telecom-agent-apk
        run: |
          gradle assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2048m"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelecomTestAgent
          path: telecom-agent-apk/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v1.0.${{ github.run_number }}
          name: TelecomTestAgent v1.0.${{ github.run_number }}
          body: |
            ## TelecomTestAgent APK

            Android agent for Telecom Test Automation Platform.
            Supports Android 11, 12, 13, 14.

            ### Install
            1. Download `TelecomTestAgent.apk` below
            2. Enable "Install unknown apps" on your phone
            3. Install and grant all permissions
            4. Enable Auto-Answer on the B-party phone

            ### After installing
            Connect phone via USB and run:
            ```
            adb -s YOUR_SERIAL forward tcp:8765 tcp:8765
            ```
          files: |
            telecom-agent-apk/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-apk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Verify backend loads
        working-directory: backend
        run: |
          node -e "
          process.env.DATABASE_URL='postgres://x:x@localhost/x';
          process.env.NODE_ENV='test';
          require('./src/db/pool');
          require('./src/middleware/errors');
          console.log('Backend OK');
          "
