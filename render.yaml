services:
  - type: web
    name: telecom-test-platform
    runtime: node
    rootDir: backend
    buildCommand: npm install && node scripts/migrate.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DB_SSL
        value: "true"
